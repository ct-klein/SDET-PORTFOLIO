# ─────────────────────────────────────────────────────────────────────────────
# Azure DevOps Pipeline – Playwright Test Automation
# Author: Christopher Klein
#
# This pipeline runs on every PR and main branch push.
# It installs dependencies, runs all test suites in parallel across browsers,
# publishes HTML and JUnit reports, and uploads artifacts on failure.
#
# Note: Azure DevOps CI/CD is a technology used professionally at CAPTRUST —
# this pipeline reflects real hands-on familiarity, not textbook knowledge.
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - '*.md'
      - 'docs/**'

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'
  PLAYWRIGHT_BROWSERS_PATH: '$(Pipeline.Workspace)/.playwright'

stages:
  - stage: Test
    displayName: 'Run Automated Tests'
    jobs:

      # ── E2E Tests ────────────────────────────────────────────────────────────
      - job: E2E
        displayName: 'E2E Tests – Chromium, Firefox, WebKit'
        timeoutInMinutes: 30

        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - task: Cache@2
            displayName: 'Cache Playwright browsers'
            inputs:
              key: 'playwright | "$(Agent.OS)" | package-lock.json'
              restoreKeys: 'playwright | "$(Agent.OS)"'
              path: '$(PLAYWRIGHT_BROWSERS_PATH)'

          - script: npm ci
            displayName: 'Install npm dependencies'

          - script: npx playwright install --with-deps
            displayName: 'Install Playwright browsers'
            env:
              PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)

          - script: npm run test:e2e
            displayName: 'Run E2E test suite'
            env:
              CI: true
              PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)

          - task: PublishTestResults@2
            displayName: 'Publish JUnit results'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'reports/junit/results.xml'
              testRunTitle: 'Playwright E2E Results'

          - task: PublishPipelineArtifact@1
            displayName: 'Upload HTML report'
            condition: always()
            inputs:
              targetPath: 'reports/html'
              artifact: 'playwright-html-report-e2e'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: 'Upload failure traces and screenshots'
            condition: failed()
            inputs:
              targetPath: 'test-results'
              artifact: 'playwright-failure-artifacts'
              publishLocation: 'pipeline'

      # ── API Tests ────────────────────────────────────────────────────────────
      - job: API
        displayName: 'API Tests'
        timeoutInMinutes: 10

        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - script: npm ci
            displayName: 'Install npm dependencies'

          - script: npx playwright install chromium
            displayName: 'Install Chromium (required by Playwright test runner)'

          - script: npm run test:api
            displayName: 'Run API test suite'
            env:
              CI: true

          - task: PublishTestResults@2
            displayName: 'Publish API test results'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'reports/junit/results.xml'
              testRunTitle: 'Playwright API Results'
